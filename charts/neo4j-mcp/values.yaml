replicaCount: 1

image:
  repository: ghcr.io/uncletawnos/neo4j-mcp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Extra arguments passed to the neo4j-mcp entrypoint
args: []

# Environment variables for the neo4j-mcp container
# See https://github.com/neo4j-contrib/mcp-neo4j for details
env:
  # Neo4j connection URI (e.g. bolt://host:7687, neo4j+s://xxx.databases.neo4j.io)
  NEO4J_URI: ""
  # Neo4j authentication credentials
  NEO4J_USERNAME: ""
  NEO4J_PASSWORD: ""
  # Neo4j database name (defaults to "neo4j" when unset)
  # NEO4J_DATABASE: ""
  # Namespace to isolate multiple MCP server instances
  # NEO4J_NAMESPACE: ""
  # Transport protocol: "http" or "stdio"
  # NEO4J_TRANSPORT: ""
  # Server bind address and port (defaults: 0.0.0.0 / 8000)
  # NEO4J_MCP_SERVER_HOST: "0.0.0.0"
  # NEO4J_MCP_SERVER_PORT: "8000"
  # NEO4J_MCP_SERVER_PATH: "/api/mcp/"

# Reference environment variables from existing Secrets or ConfigMaps
# Example:
#   envFrom:
#     - secretRef:
#         name: neo4j-credentials
envFrom: []

service:
  type: ClusterIP
  port: 8000

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}